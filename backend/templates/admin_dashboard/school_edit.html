{% extends 'admin_dashboard/base.html' %}
{% block title %}Edit School{% endblock %}
{% block page_title %}✏️ Edit School: {{ school.name }}{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>School Name *</label><input type="text" name="name" value="{{ school.name }}" required></div>
        <div class="form-group"><label>School Code *</label><input type="text" name="code" value="{{ school.code }}" required></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ school.phone }}"></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ school.email }}"></div>
        <div class="form-group"><label>Address</label><input type="text" name="address" value="{{ school.address }}"></div>
        <div class="form-group"><label>Bank Name</label><input type="text" name="bank_name" value="{{ school.bank_name }}"></div>
        <div class="form-group"><label>Bank Account Number</label><input type="text" name="bank_account_number" value="{{ school.bank_account_number }}"></div>
        <div class="form-group"><label><input type="checkbox" name="subscription_active" {% if school.subscription_active %}checked{% endif %}> Subscription Active</label></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary">Save Changes</button> <a href="/admin-dashboard/schools/" class="btn btn-danger">Cancel</a></div>
    </form>
</div>
{% endblock %}
