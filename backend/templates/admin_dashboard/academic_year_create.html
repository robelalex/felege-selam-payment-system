{% extends 'admin_dashboard/base.html' %}
{% block title %}Create Academic Year{% endblock %}
{% block page_title %}📅 Create New Academic Year{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Year EC *</label><input type="number" name="year_ec" required></div>
        <div class="form-group"><label>Name *</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Start Date</label><input type="date" name="start_date"></div>
        <div class="form-group"><label>End Date</label><input type="date" name="end_date"></div>
        <div class="form-group"><label>School</label><select name="school_id"><option value="">Select School</option>{% for school in schools %}<option value="{{ school.id }}">{{ school.name }}</option>{% endfor %}</select></div>
        <div class="form-group"><label><input type="checkbox" name="is_current"> Set as Current Year</label></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary">Create Academic Year</button> <a href="/admin-dashboard/academic-years/" class="btn btn-danger">Cancel</a></div>
    </form>
</div>
{% endblock %}
