{% extends 'admin_dashboard/base.html' %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}✏️ Edit Student: {{ student.full_name }}{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Student ID</label><input type="text" name="student_id" value="{{ student.student_id }}" required></div>
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" value="{{ student.first_name }}" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" value="{{ student.last_name }}" required></div>
        <div class="form-group"><label>Grade</label><input type="text" name="grade" value="{{ student.grade }}" required></div>
        <div class="form-group"><label>Section</label><input type="text" name="section" value="{{ student.section }}"></div>
        <div class="form-group"><label>Academic Year</label><input type="text" name="academic_year" value="{{ student.academic_year }}"></div>
        <div class="form-group"><label>Parent Full Name</label><input type="text" name="parent_full_name" value="{{ student.parent_full_name }}"></div>
        <div class="form-group"><label>Parent Phone</label><input type="text" name="parent_phone" value="{{ student.parent_phone }}"></div>
        <div class="form-group"><label>Parent Email</label><input type="email" name="parent_email" value="{{ student.parent_email }}"></div>
        <div class="form-group"><label>Monthly Fee</label><input type="number" step="0.01" name="monthly_fee" value="{{ student.monthly_fee }}"></div>
        <div class="form-group"><label>Status</label><select name="status"><option value="active">Active</option><option value="inactive">Inactive</option><option value="graduated">Graduated</option></select></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary">Save Changes</button> <a href="/admin-dashboard/students/" class="btn btn-danger">Cancel</a></div>
    </form>
</div>
{% endblock %}
