{% extends 'admin_dashboard/base.html' %}
{% block title %}Edit User{% endblock %}
{% block page_title %}✏️ Edit User: {{ user.username }}{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Username</label><input type="text" name="username" value="{{ user.username }}" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ user.email }}" required></div>
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" value="{{ user.first_name }}"></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" value="{{ user.last_name }}"></div>
        <div class="form-group"><label>New Password (leave blank to keep current)</label><input type="password" name="new_password"></div>
        <div class="form-group"><label>Role</label><select name="role"><option value="staff">Staff</option><option value="school_admin">School Admin</option><option value="super_admin">Super Admin</option></select></div>
        <div class="form-group"><label><input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}> Active</label></div>
        <div class="form-group"><label><input type="checkbox" name="is_staff" {% if user.is_staff %}checked{% endif %}> Staff Status</label></div>
        <div class="form-group"><label><input type="checkbox" name="is_superuser" {% if user.is_superuser %}checked{% endif %}> Superuser Status</label></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary">Save Changes</button> <a href="/admin-dashboard/users/" class="btn btn-danger">Cancel</a></div>
    </form>
</div>
{% endblock %}
