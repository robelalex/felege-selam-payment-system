{% extends 'admin_dashboard/base.html' %}
{% block title %}Create School{% endblock %}
{% block page_title %}🏫 Create New School{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>School Name *</label><input type="text" name="name" required></div>
        <div class="form-group"><label>School Code *</label><input type="text" name="code" required></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone"></div>
        <div class="form-group"><label>Email</label><input type="email" name="email"></div>
        <div class="form-group"><label>Address</label><input type="text" name="address"></div>
        <div class="form-group"><label><input type="checkbox" name="subscription_active"> Subscription Active</label></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary">Create School</button> <a href="/admin-dashboard/schools/" class="btn btn-danger">Cancel</a></div>
    </form>
</div>
{% endblock %}
