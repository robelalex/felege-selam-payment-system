<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>{% block title %}Super Admin Dashboard{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #1a1a2e; }
        
        /* Sidebar - Desktop */
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; overflow-y: auto; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 20px; margin-bottom: 5px; }
        .sidebar-header p { font-size: 12px; opacity: 0.7; }
        .sidebar-menu { padding: 20px 0; }
        .menu-item { padding: 12px 25px; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; padding-left: 30px; }
        .menu-item.active { background: #e94560; color: white; }
        .menu-icon { font-size: 20px; width: 25px; }
        
        /* Mobile Menu Button */
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: #e94560; color: white; border: none; width: 45px; height: 45px; border-radius: 8px; font-size: 24px; cursor: pointer; z-index: 1001; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .close-sidebar { display: none; position: fixed; top: 15px; right: 15px; background: #e94560; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 20px; cursor: pointer; z-index: 1001; }
        
        /* Main Content */
        .main-content { margin-left: 260px; padding: 20px; transition: margin-left 0.3s ease; }
        .top-bar { background: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .page-title { font-size: 24px; font-weight: 600; }
        .logout-btn { background: #e94560; color: white; padding: 8px 20px; border-radius: 5px; text-decoration: none; font-size: 14px; transition: background 0.3s; }
        .logout-btn:hover { background: #c82333; }
        .user-info { color: #666; font-size: 14px; margin-right: 15px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 32px; font-weight: bold; color: #e94560; }
        .stat-label { color: #666; margin-top: 5px; }
        
        /* Tables */
        .data-table { width: 100%; background: white; border-radius: 10px; overflow-x: auto; display: block; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .data-table table { width: 100%; border-collapse: collapse; }
        .data-table th { background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; font-size: 14px; }
        .data-table td { padding: 10px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .data-table tr:hover { background: #f5f5f5; }
        
        /* Buttons */
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 13px; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: #e94560; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin: 2px; }
        
        /* Badges */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        
        /* Forms */
        .form-container { background: white; padding: 25px; border-radius: 10px; max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .form-actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .close-sidebar { display: block; }
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 60px 10px 10px 10px; }
            .top-bar { flex-direction: column; text-align: center; }
            .page-title { font-size: 20px; }
            .stats-grid { grid-template-columns: 1fr; gap: 10px; }
            .data-table th, .data-table td { padding: 8px 5px; font-size: 11px; white-space: nowrap; }
            .btn-sm { padding: 4px 8px; font-size: 10px; }
            .stat-number { font-size: 24px; }
            .stat-card { padding: 12px; }
            .user-info { display: block; margin-bottom: 5px; }
        }
        
        @media (max-width: 480px) {
            .data-table th, .data-table td { padding: 5px 3px; font-size: 10px; }
            .btn-sm { padding: 3px 6px; font-size: 9px; }
        }
        
        /* Loading animation */
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <button class="close-sidebar" onclick="document.querySelector('.sidebar').classList.remove('open')">✕</button>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>👑 Super Admin</h2>
            <p>Full System Control</p>
        </div>
        <div class="sidebar-menu">
            <a href="/admin-dashboard/dashboard/" class="menu-item" onclick="document.querySelector('.sidebar').classList.remove('open')">📊 Dashboard</a>
            <a href="/admin-dashboard/schools/" class="menu-item" onclick="document.querySelector('.sidebar').classList.remove('open')">🏫 Schools</a>
            <a href="/admin-dashboard/users/" class="menu-item" onclick="document.querySelector('.sidebar').classList.remove('open')">👥 Users</a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div>
                <span class="user-info">Welcome, {{ request.user.username }}</span>
                <a href="/api/logout/" class="logout-btn" onclick="return confirm('Are you sure you want to logout?')">🚪 Logout</a>
            </div>
        </div>
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.querySelector('.sidebar');
            const menuToggle = document.querySelector('.menu-toggle');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });
        
        // Close sidebar on window resize (if screen becomes larger)
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.querySelector('.sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
