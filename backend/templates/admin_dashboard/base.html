<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Super Admin Dashboard{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #1a1a2e; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; overflow-y: auto; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 20px; margin-bottom: 5px; }
        .sidebar-menu { padding: 20px 0; }
        .menu-item { padding: 12px 25px; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; padding-left: 30px; }
        .menu-item.active { background: #e94560; color: white; }
        .menu-icon { font-size: 20px; width: 25px; }
        .main-content { margin-left: 260px; padding: 20px; }
        .top-bar { background: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 24px; font-weight: 600; }
        .logout-btn { background: #e94560; color: white; padding: 8px 20px; border-radius: 5px; text-decoration: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #e94560; }
        .stat-label { color: #666; margin-top: 5px; }
        .data-table { width: 100%; background: white; border-radius: 10px; overflow: hidden; }
        .data-table th { background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; }
        .data-table td { padding: 10px 15px; border-bottom: 1px solid #eee; }
        .data-table tr:hover { background: #f5f5f5; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 13px; }
        .btn-primary { background: #e94560; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .form-container { background: white; padding: 25px; border-radius: 10px; max-width: 800px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .form-actions { margin-top: 20px; display: flex; gap: 10px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>👑 Super Admin</h2>
            <p>Full System Control</p>
        </div>
<div class="sidebar-menu">
    <a href="/admin-dashboard/dashboard/" class="menu-item">📊 Dashboard</a>
    <a href="/admin-dashboard/schools/" class="menu-item">🏫 Schools</a>
    <a href="/admin-dashboard/users/" class="menu-item">👥 Users</a>
</div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <a href="/admin/logout/" class="logout-btn">Logout</a>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
