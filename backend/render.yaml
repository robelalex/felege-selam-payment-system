services:
  - type: web
    name: felege-selam-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && chmod +x build.sh && ./build.sh
    startCommand: gunicorn core.wsgi:application --timeout 180 --workers 1 --bind 0.0.0.0:10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: felege-selam-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: GUNICORN_TIMEOUT
        value: 180
      - key: WEB_CONCURRENCY
        value: 1

databases:
  - name: felege-selam-db
    databaseName: felege_selam
    user: felege_user